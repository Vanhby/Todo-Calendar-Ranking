<!DOCTYPE html>
<html lang="vi" class="bg-[#0d1117]">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Todo - StreakHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen font-sans">

  <header class="bg-[#161b22] border-b border-[#30363d] relative z-20">
    <nav class="flex items-center justify-between px-4 py-3 gap-4">
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-3">
          <svg height="32" viewBox="0 0 16 16" width="32" class="fill-[#c9d1d9]" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
          </svg>
          <span class="font-semibold text-[#c9d1d9] hidden sm:inline">StreakHub - Todo & Tags Module</span>
        </a>
      </div>
    </nav>
  </header>

  <div class="p-6 max-w-screen-lg mx-auto">
    
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-4">
        <h1 class="text-2xl font-semibold text-[#c9d1d9]">Tasks for:</h1>
        <input type="date" id="viewDate" onchange="loadTodos()" class="bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1 text-sm text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff]">
      </div>
      <button onclick="toggleForm()" class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-2 rounded-md text-sm font-medium transition-colors border border-[rgba(240,246,252,0.1)] shadow-sm">
        New Task
      </button>
    </div>

    <div id="taskForm" class="hidden mb-6 p-4 border border-[#30363d] rounded-md bg-[#161b22]">
      <h2 class="text-lg font-semibold mb-3">Tạo công việc mới</h2>
      <input type="text" id="todoTitle" placeholder="Nhập tên công việc..." class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-sm text-[#c9d1d9] mb-3 focus:outline-none focus:border-[#58a6ff]">
      
      <div class="mb-3">
        <label class="block text-sm text-[#8b949e] mb-1">Chọn ngày:</label>
        <input type="date" id="todoDate" class="bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff]">
      </div>

      <div class="mb-4">
        <label class="block text-sm text-[#8b949e] mb-2">Gắn nhãn (Tags):</label>
        <div id="tagsList" class="flex flex-wrap gap-3">
          <span class="text-sm text-gray-500">Đang tải nhãn...</span>
        </div>
      </div>

      <div class="flex justify-end gap-2">
        <button onclick="toggleForm()" class="px-4 py-2 bg-transparent text-[#c9d1d9] hover:bg-[#30363d] rounded-md text-sm transition-colors">Hủy</button>
        <button onclick="createTodo()" class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">Lưu công việc</button>
      </div>
    </div>

    <div class="border border-[#30363d] rounded-md bg-[#0d1117]">
      <div class="bg-[#161b22] border-b border-[#30363d] p-3 flex items-center gap-4 text-sm rounded-t-md">
        <span class="flex items-center gap-1.5 text-[#c9d1d9] font-semibold">
          <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"></path></svg>
          Danh sách công việc
        </span>
      </div>

      <div id="todoListContainer" class="flex flex-col min-h-[100px]">
        <div class="p-4 text-center text-[#8b949e] text-sm">Đang tải dữ liệu...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "/api";

    // Khi web vừa load xong
    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('viewDate').value = today;
      document.getElementById('todoDate').value = today;
      
      loadTags();
      loadTodos();
    });

    // Bật/tắt form thêm mới
    function toggleForm() {
      const form = document.getElementById('taskForm');
      form.classList.toggle('hidden');
    }

    // [API] Gọi Backend lấy danh sách nhãn
    async function loadTags() {
      try {
        const res = await fetch(`${API_BASE}/tags`);
        const tags = await res.json();
        
        const container = document.getElementById('tagsList');
        container.innerHTML = ''; 

        if (tags.length === 0) {
          container.innerHTML = '<span class="text-sm text-[#8b949e]">Chưa có nhãn nào trong CSDL.</span>';
          return;
        }

        tags.forEach(tag => {
          container.innerHTML += `
            <label class="flex items-center gap-2 cursor-pointer p-1.5 rounded hover:bg-[#30363d] transition-colors border border-[#30363d]">
              <input type="checkbox" value="${tag.id}" class="tag-checkbox w-4 h-4 rounded border-[#30363d] bg-[#0d1117] checked:bg-[#238636]">
              <span class="text-sm font-medium" style="color: ${tag.color}">${tag.name}</span>
            </label>
          `;
        });
      } catch (error) {
        console.error("Lỗi tải Tags:", error);
      }
    }

    // [API] Thêm công việc mới vào DB
    async function createTodo() {
      const title = document.getElementById('todoTitle').value.trim();
      const taskDate = document.getElementById('todoDate').value;
      
      if (!title) {
        alert("Bạn chưa nhập nội dung công việc!");
        return;
      }

      const checkboxes = document.querySelectorAll('.tag-checkbox:checked');
      const tagIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

      try {
        const today = new Date().toISOString().split('T')[0];
        const res = await fetch(`${API_BASE}/todos?clientToday=${today}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, taskDate, tagIds })
        });

        if (res.ok) {
          document.getElementById('todoTitle').value = ''; 
          toggleForm(); // Đóng form
          
          // Refresh list nếu trùng ngày đang xem
          if(taskDate === document.getElementById('viewDate').value) {
            loadTodos();
          }
        }
      } catch (error) {
        console.error("Lỗi tạo Todo:", error);
      }
    }

    // [API] Load danh sách Todo theo ngày
    async function loadTodos() {
      const date = document.getElementById('viewDate').value;
      const container = document.getElementById('todoListContainer');
      container.innerHTML = '<div class="p-4 text-center text-[#8b949e] text-sm">Đang tải dữ liệu...</div>';

      try {
        const res = await fetch(`${API_BASE}/todos/day?date=${date}`);
        const todos = await res.json();
        
        container.innerHTML = '';
        
        if (todos.length === 0) {
          container.innerHTML = `
            <div class="p-8 text-center text-[#8b949e]">
              <p class="text-lg mb-2">Trống trơn!</p>
              <p class="text-sm">Bạn chưa có công việc nào trong ngày này.</p>
            </div>`;
          return;
        }

        todos.forEach(todo => {
          let tagsHtml = '';
          if(todo.tags && todo.tags.length > 0) {
            todo.tags.forEach(tag => {
              // Ứng dụng cột mã màu Database trực tiếp vào viền và chữ của UI
              tagsHtml += `
                <span class="inline-flex items-center rounded-full border px-2 py-0.5 text-xs font-medium" 
                      style="border-color: ${tag.color}; color: ${tag.color};">
                  ${tag.name}
                </span>`;
            });
          }

          // Render dòng HTML theo format GitHub của bạn
          const statusClass = todo.isCompleted ? 'opacity-60 line-through' : '';
          const checkedAttr = todo.isCompleted ? 'checked' : '';
          
          container.innerHTML += `
            <div class="flex items-start gap-3 p-3 border-b border-[#30363d] hover:bg-[#161b22] group transition-colors ${statusClass}">
              <input type="checkbox" ${checkedAttr} disabled class="mt-1 w-4 h-4 rounded border-[#30363d] bg-[#0d1117] checked:bg-[#238636]">
              <div class="flex-1 min-w-0">
                <a href="#" class="text-base font-semibold text-[#c9d1d9] hover:text-[#58a6ff] block truncate">
                  ${todo.title}
                </a>
                <div class="mt-1 flex items-center gap-2 text-xs text-[#8b949e]">
                  <span>#${todo.id} - ${todo.taskDate}</span>
                </div>
              </div>
              <div class="flex items-center gap-2">
                ${tagsHtml}
              </div>
            </div>
          `;
        });
      } catch (error) {
        console.error("Lỗi tải Todo:", error);
        container.innerHTML = '<div class="p-4 text-center text-red-500 text-sm">Lỗi kết nối Server!</div>';
      }
    }
  </script>
</body>
</html>
