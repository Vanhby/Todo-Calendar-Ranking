<!DOCTYPE html>
<html lang="vi" class="bg-[#0d1117]">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreakHub</title>
    <script src="http://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen font-sans">

    <!-- Toggle state cho drawer (checkbox hack, không cần JS) -->
    <input type="checkbox" id="drawer-toggle" class="peer hidden" />

    <!-- Overlay tối phía sau drawer -->
    <label for="drawer-toggle"
                 class="fixed inset-0 z-30 bg-black/60 opacity-0 pointer-events-none peer-checked:opacity-100 peer-checked:pointer-events-auto transition-opacity"
                 aria-hidden="true"></label>

    <!-- Drawer / Menu dọc bên trái -->
    <aside class="fixed top-0 left-0 z-40 h-full w-72 bg-[#0d1117] border-r border-[#30363d] -translate-x-full peer-checked:translate-x-0 transition-transform duration-300 overflow-y-auto">
        <!-- Header drawer: logo + nút đóng -->
        <div class="flex items-center justify-between px-4 py-3">
            <svg height="32" viewBox="0 0 16 16" width="32" class="fill-[#c9d1d9]" aria-hidden="true">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            <label for="drawer-toggle" class="p-1 rounded-md hover:bg-[#30363d] cursor-pointer" aria-label="Đóng menu">
                <svg height="20" viewBox="0 0 16 16" width="20" class="fill-[#c9d1d9]" aria-hidden="true">
                    <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"></path>
                </svg>
            </label>
        </div>

        <!-- Nhóm menu chính -->
        <nav class="px-2 py-2 border-b border-[#30363d]">
            <!-- Home -->
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium hover:bg-[#30363d]">
                <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.231c0-.532.242-1.035.657-1.367l5.25-4.2Z"></path></svg>
                Home
            </a>

            <!-- Todo (Nút mới thêm) -->
            <a href="todo.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium hover:bg-[#30363d]">
                <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true">
                    <path d="M2.5 1.75v11.5c0 .414.336.75.75.75h10.5a.75.75 0 0 0 .75-.75V1.75a.75.75 0 0 0-.75-.75H3.25a.75.75 0 0 0-.75.75Zm11.25-.75A1.5 1.5 0 0 1 15 2.5v11A1.5 1.5 0 0 1 13.5 15H3.25A1.5 1.5 0 0 1 1.75 13.5V2.5A1.5 1.5 0 0 1 3.25 1h10.5ZM6.5 6.25a.75.75 0 0 1 .75-.75h4a.75.75 0 0 1 0 1.5h-4a.75.75 0 0 1-.75-.75Zm0 4a.75.75 0 0 1 .75-.75h4a.75.75 0 0 1 0 1.5h-4a.75.75 0 0 1-.75-.75Zm-2-4.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 4a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Z"></path>
                </svg>
                Todo
            </a>

            <!-- Settings (icon bánh răng) -->
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium hover:bg-[#30363d]">
                <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294.016.257.016.515 0 .772-.01.147.039.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.99 7.99 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.103-.303c-.066-.019-.176-.011-.299.071a5.93 5.93 0 0 1-.668.386c-.133.066-.194.158-.211.224l-.289 1.106c-.169.646-.715 1.196-1.458 1.26a8.13 8.13 0 0 1-1.402 0c-.743-.064-1.289-.614-1.458-1.26l-.289-1.106c-.018-.066-.078-.158-.211-.224a5.93 5.93 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a7.99 7.99 0 0 1-.704-1.217c-.315-.675-.111-1.422.364-1.891l.814-.806c.049-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.039-.246-.088-.294l-.814-.806C.635 6.045.431 5.298.746 4.623a7.99 7.99 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.103.303c.066.019.176.011.299-.071.214-.143.437-.272.668-.386.133-.066.193-.158.211-.224l.289-1.106C6.009.645 6.556.095 7.299.031A8.2 8.2 0 0 1 8 0Zm-.571 1.525c-.036.003-.108.036-.137.146l-.289 1.105c-.147.561-.549.967-.998 1.189-.173.086-.34.183-.5.29-.417.278-.97.423-1.529.27l-1.103-.303c-.109-.03-.175.016-.195.045-.22.312-.412.644-.573.99-.014.031-.021.11.059.19l.815.806c.411.406.562.957.53 1.456a4.709 4.709 0 0 0 0 .582c.032.499-.119 1.05-.53 1.456l-.815.806c-.081.08-.073.159-.059.19.162.346.353.677.573.989.02.03.085.076.195.046l1.102-.303c.56-.153 1.113-.008 1.53.27.161.107.328.204.501.29.447.222.85.629.997 1.189l.289 1.105c.029.109.101.143.137.146a6.6 6.6 0 0 0 1.142 0c.036-.003.108-.037.137-.146l.289-1.105c.147-.561.549-.967.998-1.189.173-.086.34-.183.5-.29.417-.278.97-.423 1.529-.27l1.103.303c.109.029.175-.016.195-.045.22-.313.411-.644.573-.99.014-.031.021-.11-.059-.19l-.815-.806c-.411-.406-.562-.957-.53-1.456a4.709 4.709 0 0 0 0-.582c-.032-.499.119-1.05.53-1.456l.815-.806c.081-.08.073-.159.059-.19a6.464 6.464 0 0 0-.573-.989c-.02-.03-.085-.076-.195-.046l-1.102.303c-.56.153-1.113.008-1.53-.27a4.44 4.44 0 0 0-.501-.29c-.447-.222-.85-.629-.997-1.189l-.289-1.105c-.029-.11-.101-.143-.137-.146a6.6 6.6 0 0 0-1.142 0ZM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM9.5 8a1.5 1.5 0 1 0-3.001.001A1.5 1.5 0 0 0 9.5 8Z"></path></svg>
                Settings
            </a>

            <!-- Explore (icon kính thiên văn) -->
            <a href="explore.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium hover:bg-[#30363d]">
                <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M14.184 1.143C13.581.302 12.41.121 11.594.69L8.32 2.65l-1.045-.467a.75.75 0 0 0-.866.211l-.43.51a2.94 2.94 0 0 0-.661 2.142l-2.81 1.748a.75.75 0 0 0-.302.911l1.288 3.062a.75.75 0 0 0 .956.412l1.59-.612-.633 2.852a.75.75 0 0 0 1.464.325l.879-3.957 1.733-.667.732 4.638a.75.75 0 0 0 1.482-.234l-.815-5.165a2.94 2.94 0 0 0 1.673-1.475l.276-.598a.75.75 0 0 0-.083-.778l-.654-.872 1.59-3.493a1.748 1.748 0 0 0-.696-2.236Z"></path></svg>
                Explore
            </a>
        </nav>
    </aside>

    <!-- Navbar -->
    <header class="bg-[#161b22] border-b border-[#30363d] relative z-20">
        <nav class="flex items-center justify-between px-4 py-3 gap-4">
            <!-- Hamburger + Logo -->
            <div class="flex items-center gap-3">
                <label for="drawer-toggle" class="p-1.5 rounded-md hover:bg-[#30363d] cursor-pointer" aria-label="Mở menu">
                    <svg height="20" viewBox="0 0 16 16" width="20" class="fill-[#c9d1d9]" aria-hidden="true">
                        <path d="M1 2.75A.75.75 0 0 1 1.75 2h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 2.75Zm0 5A.75.75 0 0 1 1.75 7h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 7.75ZM1.75 12h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1 0-1.5Z"></path>
                    </svg>
                </label>
                <svg height="32" viewBox="0 0 16 16" width="32" class="fill-[#c9d1d9]" aria-hidden="true">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                <span class="font-semibold text-[#c9d1d9] hidden sm:inline">StreakHub</span>
            </div>

            <!-- Right Side: Auth + Noti -->
            <div class="flex items-center gap-4">

                <!-- Nút Đăng nhập / Đăng xuất -->
                <div class="flex items-center gap-3 border-r border-[#30363d] pr-4">
                    <!-- Nút Đăng nhập: Mặc định hiện -->
                    <a href="login.html" id="nav-btn-login" class="text-sm font-medium text-[#c9d1d9] hover:text-white transition-colors">
                        Đăng nhập/Đăng xuất
                    </a>

                    <!-- Nút Đăng xuất: Mặc định ẩn (màu đỏ cho nổi bật) -->
                    <button id="nav-btn-logout" onclick="handleLogout()" class="text-sm font-medium text-[#f85149] hover:text-[#ff7b72] transition-colors hidden">
                        Đăng xuất
                    </button>
                </div>

                <!-- Noti -->
                <button class="p-2 rounded-md border border-[#30363d] hover:border-[#c9d1d9]" aria-label="Thông báo">
                    <svg height="18" viewBox="0 0 16 16" width="18" class="fill-[#c9d1d9]" aria-hidden="true">
                        <path d="M8 16a2 2 0 0 0 1.985-1.75c.017-.137-.097-.25-.235-.25h-3.5c-.138 0-.252.113-.235.25A2 2 0 0 0 8 16ZM3 5a5 5 0 0 1 10 0v2.947c0 .05.015.098.042.139l1.703 2.555A1.519 1.519 0 0 1 13.482 13H2.518a1.516 1.516 0 0 1-1.263-2.359l1.703-2.555A.255.255 0 0 0 3 7.947Z"></path>
                    </svg>
                </button>
            </div>
        </nav>
    </header>

    <!-- Layout 3 cột -->
    <div class="flex flex-col lg:flex-row gap-6 p-6 max-w-screen-2xl mx-auto">

        <!-- Sidebar trái -->
        <aside class="w-full lg:w-72 flex-shrink-0">
            <img src="http://avatars.githubusercontent.com/u/9919?v=4"
                          alt="Ảnh đại diện người dùng"
                          class="w-32 h-32 rounded-full border border-[#30363d] mb-4" />
            <h1 id="user-display-name" class="text-xl font-semibold text-[#c9d1d9]">Loading...</h1>
            <p id="user-username" class="text-[#6e7681] mb-4">@loading</p>

            <!-- Current Streak -->
            <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4 flex items-center gap-3 mb-4">
                <svg height="28" viewBox="0 0 24 24" width="28" class="fill-[#f78166]" aria-hidden="true">
                    <path d="M12 23c4.97 0 9-3.58 9-8 0-2.5-1.5-5.5-3.5-7.5.5 2-1 3-2 3.5 0-3-2-6.5-5-8 .5 4-2 6-3.5 8.5C5.5 8.5 5 10.5 5 12c0 4.42 4.03 11 7 11z" />
                </svg>
                <div>
                    <p class="text-sm text-[#6e7681]">Current Streak</p>
                    <p id="streak-count" class="text-lg font-bold text-[#c9d1d9]">0 days</p>
                </div>
            </div>

            <!-- Top rated todolists -->
            <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4">
                <div class="flex items-center gap-2 mb-3">
                    <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#e3b341]" aria-hidden="true">
                        <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path>
                    </svg>
                    <h2 class="text-sm font-semibold text-[#c9d1d9]">Top Rated Todolists</h2>
                </div>

                <ul class="space-y-2">
                    <li class="flex items-center justify-between gap-2 p-2 rounded-md hover:bg-[#30363d]">
                        <span class="text-sm text-[#c9d1d9] truncate">Morning Routine</span>
                        <span class="flex items-center gap-1 text-xs text-[#e3b341] flex-shrink-0">
                            <svg height="12" viewBox="0 0 16 16" width="12" class="fill-[#e3b341]" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
                            4.9
                        </span>
                    </li>
                    <li class="flex items-center justify-between gap-2 p-2 rounded-md hover:bg-[#30363d]">
                        <span class="text-sm text-[#c9d1d9] truncate">Workout Plan</span>
                        <span class="flex items-center gap-1 text-xs text-[#e3b341] flex-shrink-0">
                            <svg height="12" viewBox="0 0 16 16" width="12" class="fill-[#e3b341]" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
                            4.7
                        </span>
                    </li>
                    <li class="flex items-center justify-between gap-2 p-2 rounded-md hover:bg-[#30363d]">
                        <span class="text-sm text-[#c9d1d9] truncate">Study English</span>
                        <span class="flex items-center gap-1 text-xs text-[#e3b341] flex-shrink-0">
                            <svg height="12" viewBox="0 0 16 16" width="12" class="fill-[#e3b341]" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
                            4.5
                        </span>
                    </li>
                    <li class="flex items-center justify-between gap-2 p-2 rounded-md hover:bg-[#30363d]">
                        <span class="text-sm text-[#c9d1d9] truncate">Side Project</span>
                        <span class="flex items-center gap-1 text-xs text-[#e3b341] flex-shrink-0">
                            <svg height="12" viewBox="0 0 16 16" width="12" class="fill-[#e3b341]" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
                            4.3
                        </span>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- Main Content: Lịch -->
        <main class="flex-1 min-w-0">
            <div class="bg-[#161b22] border border-[#30363d] rounded-md p-5">

                <div class="flex items-center justify-between mb-4 gap-2 flex-wrap">
                    <h2 id="cal-title" class="text-base font-semibold text-[#c9d1d9]"></h2>
                    <div class="flex items-center gap-2">
                        <button id="prev-month" class="p-1.5 rounded-md border border-[#30363d] hover:border-[#c9d1d9]" aria-label="Tháng trước">
                            <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M9.78 12.78a.75.75 0 0 1-1.06 0L4.47 8.53a.75.75 0 0 1 0-1.06l4.25-4.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L6.06 8l3.72 3.72a.75.75 0 0 1 0 1.06Z"></path></svg>
                        </button>
                        <select id="month-select" class="bg-[#0d1117] border border-[#30363d] rounded-md px-2 py-1.5 text-sm text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff]"></select>
                        <select id="year-select" class="bg-[#0d1117] border border-[#30363d] rounded-md px-2 py-1.5 text-sm text-[#c9d1d9] focus:outline-none focus:border-[#58a6ff]"></select>
                        <button id="today-btn" class="px-3 py-1.5 rounded-md border border-[#30363d] text-sm text-[#c9d1d9] hover:border-[#c9d1d9]">Hôm nay</button>
                        <button id="next-month" class="p-1.5 rounded-md border border-[#30363d] hover:border-[#c9d1d9]" aria-label="Tháng sau">
                            <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-7 gap-2 mb-2 text-center text-xs text-[#6e7681]">
                    <span>CN</span><span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span>
                </div>

                <div id="calendar" class="grid grid-cols-7 gap-2"></div>

                <div class="flex items-center justify-end gap-2 mt-4 text-xs text-[#6e7681]">
                    <span>Less</span>
                    <div class="w-3 h-3 rounded-sm bg-[#161b22] border border-[#30363d]"></div>
                    <div class="w-3 h-3 rounded-sm bg-[#0e4429]"></div>
                    <div class="w-3 h-3 rounded-sm bg-[#006d32]"></div>
                    <div class="w-3 h-3 rounded-sm bg-[#26a641]"></div>
                    <div class="w-3 h-3 rounded-sm bg-[#39d353]"></div>
                    <span>More</span>
                </div>
            </div>
        </main>

        <!-- Panel phải: Việc hôm nay -->
        <aside class="w-full lg:w-80 flex-shrink-0">
            <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4">
                <div class="flex items-center justify-between mb-1">
                    <h2 id="todo-panel-title" class="text-sm font-semibold text-[#c9d1d9]">Hôm nay</h2>
                    <span id="today-progress" class="text-xs text-[#6e7681]"></span>
                    <button onclick="toggleTaskForm()" class="bg-[#238636] hover:bg-[#2ea043] text-white text-[10px] px-2 py-0.5 rounded border border-[rgba(240,246,252,0.1)] transition-colors">
                        + New Task
                    </button>
                </div>
                <p id="today-date" class="text-xs text-[#6e7681] mb-3"></p>

                <div id="taskCreationForm" class="hidden my-3 p-3 border border-[#30363d] rounded bg-[#0d1117]">
                    <input type="text" id="inputTodoTitle" placeholder="Nhập tên việc..." autocomplete="off" class="w-full bg-[#161b22] border border-[#30363d] rounded px-2 py-1 text-xs text-[#c9d1d9] mb-2 focus:outline-none focus:border-[#58a6ff]">
                    <div class="mb-2">
                        <label class="block text-[10px] text-[#8b949e] mb-0.5">Ngày thực hiện:</label>
                        <input type="date" id="inputTodoDate" class="bg-[#161b22] border border-[#30363d] rounded px-2 py-1 text-xs text-[#c9d1d9] focus:outline-none">
                    </div>
                    <div class="mb-3">
                        <label class="block text-[10px] text-[#8b949e] mb-1">Chọn nhãn (Tags):</label>
                        <div id="formTagsContainer" class="flex flex-wrap gap-1.5"></div>
                    </div>
                    <div class="flex justify-end gap-1.5 text-xs">
                        <button onclick="toggleTaskForm()" class="px-2 py-1 hover:bg-[#30363d] rounded">Hủy</button>
                        <button onclick="submitTodo()" class="bg-[#238636] px-2 py-1 text-white rounded font-medium">Lưu</button>
                    </div>
                </div>

                <p class="text-xs font-semibold text-[#6e7681] uppercase tracking-wide mb-2">Chưa làm</p>
                <ul id="todo-pending" class="space-y-2 mb-4"></ul>

                <p class="text-xs font-semibold text-[#6e7681] uppercase tracking-wide mb-2">Đã làm</p>
                <ul id="todo-done" class="space-y-2"></ul>
            </div>
        </aside>
    </div>

    <script>
        // ==========================================
        // LOGIC CHO PHẦN CÔNG VIỆC (TODO/TAGS)
        // ==========================================
        const API_BASE = "/api";

        document.addEventListener('DOMContentLoaded', () => {
            const todayStr = new Date().toISOString().split('T')[0];
            if (document.getElementById('inputTodoDate')) {
                document.getElementById('inputTodoDate').value = todayStr;
        }
            loadTags();
            loadTodosByDay(todayStr);
            setupCalendarEvents();
            renderCalendar();
            loadUserData();
        });

        function toggleTaskForm() {
            const form = document.getElementById('taskCreationForm');
            if (form) form.classList.toggle('hidden');
        }

        async function loadTags() {
            try {
                const res = await fetch(`${API_BASE}/tags`);
                const tags = await res.json();
                const container = document.getElementById('formTagsContainer');
                if (!container) return;
                container.innerHTML = '';

                if (tags.length === 0) {
                    container.innerHTML = '<span class="text-[11px] text-[#6e7681]">Chưa có nhãn nào.</span>';
                    return;
                }

                tags.forEach(tag => {
                    container.innerHTML += `
                <label class="flex items-center gap-1 border border-[#30363d] px-1.5 py-0.5 rounded cursor-pointer text-[11px]">
                  <input type="checkbox" value="${tag.id}" class="tag-form-checkbox w-3 h-3 rounded bg-[#0d1117] border-[#30363d]">
                  <span style="color: ${tag.color}; font-weight: bold;">${tag.name}</span>
                </label>
              `;
                });
            } catch (err) {
                console.error("Lỗi khi tải tags:", err);
            }
        }

        async function submitTodo() {
            const title = document.getElementById('inputTodoTitle').value.trim();
            const taskDate = document.getElementById('inputTodoDate').value;

            if (!title) {
                alert("Vui lòng nhập nội dung công việc!");
                return;
            }

            const checkboxes = document.querySelectorAll('.tag-form-checkbox:checked');
            const tagIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

            try {
                const userId = localStorage.getItem('currentUserId') || 0;
                const todayStr = new Date().toISOString().split('T')[0];
                const res = await fetch(`${API_BASE}/todos?clientToday=${todayStr}&userId=${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, taskDate, tagIds })
                });

                if (res.ok) {
                    document.getElementById('inputTodoTitle').value = '';
                    toggleTaskForm();
                    loadTodosByDay(taskDate);
                    // Reload lại lịch để cập nhật màu sắc ô đóng góp đóng góp
                    if (typeof renderCalendar === "function") renderCalendar();
                }
            } catch (err) {
                console.error("Lỗi khi tạo Todo mới:", err);
            }
        }

        async function loadTodosByDay(targetDate) {
            const pendingList = document.getElementById('todo-pending');
            const doneList = document.getElementById('todo-done');

            if (!pendingList || !doneList) return;

            pendingList.innerHTML = '<li class="text-xs text-[#6e7681] italic">Đang tải việc...</li>';
            doneList.innerHTML = '<li class="text-xs text-[#6e7681] italic">Đang tải việc...</li>';

            try {
                const titleEl = document.getElementById('todo-panel-title');
                if (titleEl) {
                    const todayStr = new Date().toISOString().split('T')[0];
                    if (targetDate === todayStr) {
                        titleEl.innerText = "Hôm nay";
                    } else {
                        // Chuyển định dạng YYYY-MM-DD thành Ngày DD/MM/YYYY
                        const [year, month, day] = targetDate.split('-');
                        titleEl.innerText = `Ngày ${day}/${month}/${year}`;
                    }
                    // 1. ÉP KIỂU LẤY ĐÚNG USER SỐ 7 (Cho giống Postman của bạn)
                    const userId = localStorage.getItem('currentUserId') || 0;

                    // 2. Nếu targetDate bị rỗng (xảy ra lỗi), lấy ngay ngày hôm nay đắp vào
                    if (!targetDate) {
                        targetDate = new Date().toISOString().split('T')[0];
                    }

                    // 3. Xử lý triệt để vụ dư dấu gạch chéo //
                    const baseUrl = API_BASE.endsWith('/') ? API_BASE.slice(0, -1) : API_BASE;

                    // Tạo URL hoàn chỉnh
                    const fetchUrl = `${baseUrl}/todos/day?date=${targetDate}&userId=${userId}`;

                    // IN RA CONSOLE ĐỂ KIỂM TRA
                    console.log("🌐 Trình duyệt đang gọi API:", fetchUrl);

                    const res = await fetch(fetchUrl);
                    const todos = await res.json();

                    pendingList.innerHTML = '';
                    doneList.innerHTML = '';

                    let hasPending = false;
                    let hasDone = false;

                    // ... MỌI CODE XỬ LÝ HTML BÊN DƯỚI GIỮ NGUYÊN ...
                    todos.forEach(todo => {
                        let tagsHtml = '';
                        if (todo.tags && todo.tags.length > 0) {
                            todo.tags.forEach(t => {
                                tagsHtml += `<span class="text-[10px] border px-1.5 py-0.2 rounded-full font-medium" style="border-color: ${t.color}; color: ${t.color};">${t.name}</span>`;
                            });
                        }

                        const itemHtml = `
                        <li class="flex items-start gap-2 p-2 rounded-md hover:bg-[#30363d] group transition-colors">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium ${todo.isCompleted ? 'text-[#8b949e] line-through' : 'text-[#c9d1d9]'} truncate">${todo.title}</p>
                                <div class="flex flex-wrap gap-1 mt-1">${tagsHtml}</div>
                            </div>
                        </li>
                    `;

                        if (todo.isCompleted) {
                            doneList.innerHTML += itemHtml;
                            hasDone = true;
                        } else {
                            pendingList.innerHTML += itemHtml;
                            hasPending = true;
                        }
                    });

                    if (!hasPending) pendingList.innerHTML = '<li class="text-xs text-[#6e7681] italic p-1">Không có việc tồn đọng</li>';
                    if (!hasDone) doneList.innerHTML = '<li class="text-xs text-[#6e7681] italic p-1">Chưa hoàn thành việc nào</li>';
                    }   
                } catch (err) {
                    console.error("Lỗi kết nối API:", err);
                    pendingList.innerHTML = '<li class="text-xs text-red-500/80 p-1">Lỗi kết nối API!</li>';
                    doneList.innerHTML = '<li class="text-xs text-red-500/80 p-1">Lỗi kết nối API!</li>';
                }
           
        }

        // ==========================================
        // LOGIC CỦA LỊCH (CALENDAR) GỘP TỪ FILE NGOÀI
        // ==========================================
        const CALENDAR_API_BASE = "/api"; // Fixed sang cổng 5127 phục vụ Lịch
        const currentUserId = localStorage.getItem('currentUserId') || 1;

        const contribColors = ["#161b22", "#0e4429", "#006d32", "#26a641", "#39d353"];
        const monthNames = [
            "Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6",
            "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"
        ];

        const calendar = document.getElementById("calendar");
        const title = document.getElementById("cal-title");
        const monthSelect = document.getElementById("month-select");
        const yearSelect = document.getElementById("year-select");

        const today = new Date();
        let viewYear = today.getFullYear();
        let viewMonth = today.getMonth();

        async function fetchCalendarData(userId, year, month) {
            try {
                const backendMonth = month + 1;
                const url = `${CALENDAR_API_BASE}/calendar/month/${userId}?year=${year}&month=${backendMonth}`;

                const response = await fetch(url);
                if (!response.ok) throw new Error("Lỗi mạng hoặc API Lịch chưa chạy!");

                return await response.json();
            } catch (error) {
                console.error("Không lấy được dữ liệu lịch:", error);
                return null;
            }
        }

        function setupCalendarEvents() {
            if (!monthSelect || !yearSelect) return;

            monthNames.forEach((name, idx) => {
                const opt = document.createElement("option");
                opt.value = idx;
                opt.textContent = name;
                opt.className = "bg-[#161b22]";
                monthSelect.appendChild(opt);
            });

            for (let y = today.getFullYear() - 10; y <= today.getFullYear() + 5; y++) {
                const opt = document.createElement("option");
                opt.value = y;
                opt.textContent = y;
                opt.className = "bg-[#161b22]";
                yearSelect.appendChild(opt);
            }

            document.getElementById("prev-month").addEventListener("click", () => changeMonth(-1));
            document.getElementById("next-month").addEventListener("click", () => changeMonth(1));
            document.getElementById("today-btn").addEventListener("click", () => {
                viewYear = today.getFullYear();
                viewMonth = today.getMonth();
                renderCalendar();
            });

            monthSelect.addEventListener("change", (e) => { viewMonth = parseInt(e.target.value); renderCalendar(); });
            yearSelect.addEventListener("change", (e) => { viewYear = parseInt(e.target.value); renderCalendar(); });
            }

        function changeMonth(delta) {
            viewMonth += delta;
            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
            else if (viewMonth > 11) { viewMonth = 0; viewYear++; }
            renderCalendar();
        }

        async function renderCalendar() {
            if (!calendar || !title) return;
            calendar.innerHTML = "";
            title.textContent = monthNames[viewMonth] + " " + viewYear;
            monthSelect.value = viewMonth;
            yearSelect.value = viewYear;

            const apiData = await fetchCalendarData(currentUserId, viewYear, viewMonth);

            const firstDay = new Date(viewYear, viewMonth, 1).getDay();
            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

            for (let i = 0; i < 42; i++) {
                const cell = document.createElement("div");
                const dayNum = i - firstDay + 1;
                const inMonth = dayNum >= 1 && dayNum <= daysInMonth;

                if (inMonth) {
                    let level = 0;
                    if (apiData && apiData.days) {
                        const backendMonthStr = String(viewMonth + 1).padStart(2, '0');
                        const dayStr = String(dayNum).padStart(2, '0');
                        const targetDateStr = `${viewYear}-${backendMonthStr}-${dayStr}`;

                        const dayInfo = apiData.days.find(d => d.date === targetDateStr);
                        if (dayInfo) {
                            level = dayInfo.colorLevel;
                        }
                    }

                    const color = contribColors[level];
                    const border = color === "#161b22" ? "#30363d" : "transparent";

                    cell.className = "aspect-square rounded-md flex items-start justify-end p-1 text-xs font-medium border hover:border-white cursor-pointer";
                    cell.style.backgroundColor = color;
                    cell.style.borderColor = border;
                    cell.style.color = color === "#161b22" ? "#6e7681" : "#ffffff";
                    cell.textContent = dayNum;

                    // Đồng bộ sự kiện nhấn vào một ngày trên lịch sẽ reload list Todo của ngày đó
                    cell.addEventListener("click", () => {
                        const backendMonthStr = String(viewMonth + 1).padStart(2, '0');
                        const dayStr = String(dayNum).padStart(2, '0');
                        loadTodosByDay(`${viewYear}-${backendMonthStr}-${dayStr}`);
                });

                    if (dayNum === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear()) {
                        cell.style.borderColor = "#58a6ff";
                    }
                } else {
                    cell.className = "aspect-square rounded-md border border-transparent opacity-20";
                }
                calendar.appendChild(cell);
            }
        }
        async function loadUserData() {
            const userId = localStorage.getItem('currentUserId');

            try {
                // 1. Lấy thông tin User
                const userRes = await fetch(`${API_BASE}/auth/me/${userId}`);; // Đảm bảo API này trả về thông tin user
                if (userRes.ok) {
                    const userData = await userRes.json();
                    // Cập nhật DOM
                    document.getElementById('user-display-name').innerText = userData.data.username;
                    document.getElementById('user-username').innerText = '@' + userData.data.username;
                }

                // 2. Lấy Streak
                // Lưu ý: Endpoint này bạn đã có trong CalendarController: /api/calendar/streak/{userId}
                const streakRes = await fetch(`${CALENDAR_API_BASE}/calendar/streak/${userId}`);
                if (streakRes.ok) {
                    const streakData = await streakRes.json();
                    // Giả sử API trả về { streak: 12 }
                    document.getElementById('streak-count').innerText = `${streakData.currentStreak || 0} days`;
                }
            } catch (err) {
                console.error("Lỗi khi tải User/Streak:", err);
            }
        }

        function handleLogout() {
            // Xóa ID khỏi trình duyệt (Rút ví)
            localStorage.removeItem('currentUserId');
            // Đẩy về trang Đăng nhập
            window.location.href = "login.html";
        }
     
    </script>
</body>
</html>
