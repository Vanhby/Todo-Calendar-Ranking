
<header class="bg-[#161b22] border-b border-[#30363d]">
  <nav class="flex items-center justify-between px-4 py-3 gap-4">
    <div class="flex items-center gap-3">
      <a asp-controller="Home" asp-action="Explore" class="p-1.5 rounded-md hover:bg-[#30363d]" aria-label="Explore">
        <svg height="20" viewBox="0 0 16 16" width="20" class="fill-[#c9d1d9]" aria-hidden="true">
          <path d="M1 2.75A.75.75 0 0 1 1.75 2h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 2.75Zm0 5A.75.75 0 0 1 1.75 7h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 7.75ZM1.75 12h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1 0-1.5Z"></path>
        </svg>
      </a>
      <svg height="32" viewBox="0 0 16 16" width="32" class="fill-[#c9d1d9]" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
      <span class="font-semibold text-[#c9d1d9]">Explore</span>
    </div>

    <div class="flex-1 max-w-md">
      <input
        id="navbar-open-share"
        type="text"
        placeholder="Nhập mã Share..."
        class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm text-[#c9d1d9] placeholder-[#6e7681] focus:outline-none focus:border-[#58a6ff]"
      />
    </div>

    <div class="relative">
      <button id="notifications-toggle" type="button" class="relative p-2 rounded-md border border-[#30363d] hover:border-[#c9d1d9]" aria-label="Thông báo">
        <svg height="18" viewBox="0 0 16 16" width="18" class="fill-[#c9d1d9]" aria-hidden="true">
          <path d="M8 16a2 2 0 0 0 1.985-1.75c.017-.137-.097-.25-.235-.25h-3.5c-.138 0-.252.113-.235.25A2 2 0 0 0 8 16ZM3 5a5 5 0 0 1 10 0v2.947c0 .05.015.098.042.139l1.703 2.555A1.519 1.519 0 0 1 13.482 13H2.518a1.516 1.516 0 0 1-1.263-2.359l1.703-2.555A.255.255 0 0 0 3 7.947Z"></path>
        </svg>
        <span id="notifications-badge" class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-[#f85149] text-white text-[10px] leading-[18px] text-center"></span>
      </button>
      <div id="notifications-panel" class="hidden absolute right-0 mt-2 w-80 max-h-96 overflow-y-auto bg-[#161b22] border border-[#30363d] rounded-md shadow-xl z-50">
        <div class="px-4 py-3 border-b border-[#30363d] text-sm font-semibold">Notifications</div>
        <div id="notifications-list"></div>
      </div>
    </div>
  </nav>
</header>

<div class="flex flex-col lg:flex-row gap-6 p-6 max-w-screen-2xl mx-auto">
  <aside class="w-full lg:w-72 flex-shrink-0">
    <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4 mb-4 text-center">
      <img
        id="profile-avatar"
        src="https://avatars.githubusercontent.com/u/9919?v=4"
        alt="Ảnh đại diện người dùng"
        class="w-28 h-28 rounded-full border border-[#30363d] mx-auto mb-3"
      />
      <p id="profile-username" class="text-lg font-semibold text-[#c9d1d9]">...</p>
    </div>

    <div class="bg-[#161b22] border border-[#30363d] rounded-md divide-y divide-[#30363d]">
      <span id="starred-topics-count" class="block px-4 py-3 text-sm text-[#58a6ff]">0 starred topics</span>
      <span id="starred-todolists-count" class="block px-4 py-3 text-sm text-[#58a6ff]">0 starred todolist</span>
    </div>

    <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4 mt-4">
      <div class="flex items-center gap-2 mb-3">
        <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M4.72 3.22a.75.75 0 0 1 1.06 1.06L2.06 8l3.72 3.72a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L.47 8.53a.75.75 0 0 1 0-1.06Zm6.56 0a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734L13.94 8l-3.72-3.72a.75.75 0 0 1 0-1.06Z"></path></svg>
        <h2 class="text-sm font-semibold text-[#c9d1d9]">Mở Todolist bằng mã</h2>
      </div>
      <input
        id="sidebar-open-share-code"
        type="text"
        placeholder="VD: a1b2-c3d4"
        class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm text-[#c9d1d9] placeholder-[#6e7681] focus:outline-none focus:border-[#58a6ff] mb-2"
      />
      <button id="sidebar-open-share-btn" type="button" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white text-sm font-medium rounded-md px-3 py-1.5">Mở Todolist</button>
    </div>

    <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4 mt-4">
      <h2 class="text-sm font-semibold text-[#c9d1d9] mb-3">Do Not Disturb</h2>
      <div class="space-y-2">
        <label class="block text-xs text-[#8b949e]">Start</label>
        <input id="dnd-start" type="time" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm" />
        <label class="block text-xs text-[#8b949e]">End</label>
        <input id="dnd-end" type="time" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm" />
      </div>
      <div class="flex gap-2 mt-3">
        <button id="dnd-save" type="button" class="flex-1 bg-[#238636] hover:bg-[#2ea043] text-white text-sm rounded-md px-3 py-1.5">Save</button>
        <button id="dnd-clear" type="button" class="flex-1 border border-[#30363d] text-sm rounded-md px-3 py-1.5 hover:border-[#c9d1d9]">Clear</button>
      </div>
      <p id="dnd-status" class="text-xs text-[#8b949e] mt-2"></p>
    </div>
  </aside>

  <main class="flex-1 min-w-0">
    <nav class="flex items-center gap-6 border-b border-[#30363d] mb-6 text-sm overflow-x-auto">
      <a asp-controller="Home" asp-action="Explore" class="pb-3 border-b-2 border-[#f78166] font-semibold text-[#c9d1d9] whitespace-nowrap">Explore</a>
      <a asp-controller="Home" asp-action="TodoDetail" class="pb-3 text-[#6e7681] hover:text-[#c9d1d9] whitespace-nowrap">My Tasks</a>
      <span class="pb-3 text-[#6e7681] whitespace-nowrap">Topics</span>
      <span class="pb-3 text-[#6e7681] whitespace-nowrap">Trending</span>
      <span class="pb-3 text-[#6e7681] whitespace-nowrap">Collections</span>
      <span class="pb-3 text-[#6e7681] whitespace-nowrap">Events</span>
    </nav>

    <h1 class="text-2xl font-semibold text-[#c9d1d9] mb-6">Trending Todolists hôm nay</h1>
    <div id="trending-shares-list" class="space-y-4"></div>
  </main>

  <aside class="w-full lg:w-80 flex-shrink-0">
    <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4">
      <div class="flex items-center gap-2 mb-4">
        <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#f78166]" aria-hidden="true"><path d="M5.5 3.5a2 2 0 1 1 4 0 2 2 0 0 1-4 0ZM2 13.5a3.5 3.5 0 0 1 7 0v.5H2Z"></path></svg>
        <h2 class="text-base font-semibold text-[#c9d1d9]">Trending Users <span class="text-[#6e7681] font-normal">today</span></h2>
      </div>
      <ul id="trending-users-list" class="divide-y divide-[#30363d]"></ul>
    </div>
  </aside>
</div>

@section Scripts {
  <script src="~/js/explore.js" asp-append-version="true"></script>
}
