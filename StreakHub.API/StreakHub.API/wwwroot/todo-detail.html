<!DOCTYPE html>
<html lang="vi" class="bg-[#0d1117]">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks · StreakHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen font-sans">

<input type="checkbox" id="drawer-toggle" class="peer hidden" />

<label
  for="drawer-toggle"
  class="fixed inset-0 z-30 bg-black/60 opacity-0 pointer-events-none peer-checked:opacity-100 peer-checked:pointer-events-auto transition-opacity"
  aria-hidden="true"
></label>

<aside class="fixed top-0 left-0 z-40 h-full w-72 bg-[#0d1117] border-r border-[#30363d] -translate-x-full peer-checked:translate-x-0 transition-transform duration-300 overflow-y-auto">
  <div class="flex items-center justify-between px-4 py-3">
    <svg height="32" viewBox="0 0 16 16" width="32" class="fill-[#c9d1d9]" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
    </svg>
    <label for="drawer-toggle" class="p-1 rounded-md hover:bg-[#30363d] cursor-pointer" aria-label="Đóng menu">
      <svg height="20" viewBox="0 0 16 16" width="20" class="fill-[#c9d1d9]" aria-hidden="true">
        <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"></path>
      </svg>
    </label>
  </div>
  <nav class="px-2 py-2 border-b border-[#30363d]">
    <a href="/explore.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium hover:bg-[#30363d]">
      <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.231c0-.532.242-1.035.657-1.367l5.25-4.2Z"></path></svg>
      Home
    </a>
    <a href="/todo-detail.html" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium hover:bg-[#30363d] mt-1">
      <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]" aria-hidden="true"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"></path></svg>
      My Tasks
    </a>
  </nav>

  <div class="p-4 border-b border-[#30363d]">
    <h2 class="text-sm font-semibold text-[#c9d1d9] mb-3">Do Not Disturb</h2>
    <div class="space-y-2">
      <label class="block text-xs text-[#8b949e]">Start</label>
      <input id="dnd-start" type="time" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm" />
      <label class="block text-xs text-[#8b949e]">End</label>
      <input id="dnd-end" type="time" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm" />
    </div>
    <div class="flex gap-2 mt-3">
      <button id="dnd-save" type="button" class="flex-1 bg-[#238636] hover:bg-[#2ea043] text-white text-sm rounded-md px-3 py-1.5">Save</button>
      <button id="dnd-clear" type="button" class="flex-1 border border-[#30363d] text-sm rounded-md px-3 py-1.5 hover:border-[#c9d1d9]">Clear</button>
    </div>
    <p id="dnd-status" class="text-xs text-[#8b949e] mt-2"></p>
  </div>
</aside>

<header class="bg-[#161b22] border-b border-[#30363d] relative z-20">
  <nav class="flex items-center justify-between px-4 py-3 gap-4">
    <div class="flex items-center gap-3">
      <label for="drawer-toggle" class="p-1.5 rounded-md hover:bg-[#30363d] cursor-pointer" aria-label="Mở menu">
        <svg height="20" viewBox="0 0 16 16" width="20" class="fill-[#c9d1d9]" aria-hidden="true">
          <path d="M1 2.75A.75.75 0 0 1 1.75 2h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 2.75Zm0 5A.75.75 0 0 1 1.75 7h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 7.75ZM1.75 12h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1 0-1.5Z"></path>
        </svg>
      </label>
      <svg height="32" viewBox="0 0 16 16" width="32" class="fill-[#c9d1d9]" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
      <span class="font-semibold text-[#c9d1d9] hidden sm:inline">StreakHub</span>
    </div>

    <div class="relative">
      <button id="notifications-toggle" type="button" class="relative p-2 rounded-md border border-[#30363d] hover:border-[#c9d1d9]" aria-label="Thông báo">
        <svg height="18" viewBox="0 0 16 16" width="18" class="fill-[#c9d1d9]" aria-hidden="true">
          <path d="M8 16a2 2 0 0 0 1.985-1.75c.017-.137-.097-.25-.235-.25h-3.5c-.138 0-.252.113-.235.25A2 2 0 0 0 8 16ZM3 5a5 5 0 0 1 10 0v2.947c0 .05.015.098.042.139l1.703 2.555A1.519 1.519 0 0 1 13.482 13H2.518a1.516 1.516 0 0 1-1.263-2.359l1.703-2.555A.255.255 0 0 0 3 7.947Z"></path>
        </svg>
        <span id="notifications-badge" class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-[#f85149] text-white text-[10px] leading-[18px] text-center"></span>
      </button>
      <div id="notifications-panel" class="hidden absolute right-0 mt-2 w-80 max-h-96 overflow-y-auto bg-[#161b22] border border-[#30363d] rounded-md shadow-xl z-50">
        <div class="px-4 py-3 border-b border-[#30363d] text-sm font-semibold">Notifications</div>
        <div id="notifications-list"></div>
      </div>
    </div>
  </nav>
</header>

<div class="p-6 max-w-screen-lg mx-auto" data-task-date="">
  <div class="flex items-center justify-between mb-6">
    <h1 id="page-title" class="text-2xl font-semibold text-[#c9d1d9]">Tasks</h1>
    <button id="new-task-btn" type="button" class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-2 rounded-md text-sm font-medium transition-colors border border-[rgba(240,246,252,0.1)] shadow-sm">
      New Task
    </button>
  </div>

  <div class="mb-4">
    <input id="task-search" type="text" placeholder="Search tasks..." class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] transition-all" />
  </div>

  <div class="border border-[#30363d] rounded-md bg-[#0d1117]">
    <div class="bg-[#161b22] border-b border-[#30363d] p-3 flex items-center gap-4 text-sm rounded-t-md">
      <a id="filter-open" href="#" class="flex items-center gap-1.5 text-[#c9d1d9] font-semibold hover:text-[#c9d1d9]">
        <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#c9d1d9]"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"></path></svg>
        <span id="open-count">0 Open</span>
      </a>
      <a id="filter-closed" href="#" class="flex items-center gap-1.5 text-[#8b949e] font-normal hover:text-[#c9d1d9]">
        <svg height="16" viewBox="0 0 16 16" width="16" class="fill-[#8b949e]"><path d="M11.28 6.78a.75.75 0 0 0-1.06-1.06L7.25 8.69 5.78 7.22a.75.75 0 0 0-1.06 1.06l2 2a.75.75 0 0 0 1.06 0l3.5-3.5Z"></path><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0Zm-1.5 0a6.5 6.5 0 1 0-13 0 6.5 6.5 0 0 0 13 0Z"></path></svg>
        <span id="closed-count">0 Closed</span>
      </a>
    </div>
    <div id="task-list" class="flex flex-col"></div>
  </div>
</div>

<!-- Task Modal -->
<div id="task-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/70 px-4">
  <div class="w-full max-w-lg bg-[#161b22] border border-[#30363d] rounded-md p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 id="task-modal-title" class="text-lg font-semibold">New Task</h2>
      <button id="task-modal-close" type="button" class="text-[#8b949e] hover:text-[#c9d1d9]">Close</button>
    </div>
    <form id="task-form" class="space-y-3">
      <input id="task-title" type="text" placeholder="Task title" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-sm" required />
      <input id="task-tags" type="text" placeholder="Tags (comma separated)" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-sm" />
      <label class="flex items-center gap-2 text-sm">
        <input id="task-completed" type="checkbox" class="rounded border-[#30363d]" />
        Mark as completed
      </label>
      <button type="submit" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white rounded-md px-3 py-2 text-sm">Save Task</button>
    </form>
  </div>
</div>

<!-- Reminder Modal -->
<div id="reminder-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/70 px-4">
  <div class="w-full max-w-lg bg-[#161b22] border border-[#30363d] rounded-md p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 id="reminder-form-title" class="text-lg font-semibold">Task Reminders</h2>
      <button id="reminder-modal-close" type="button" class="text-[#8b949e] hover:text-[#c9d1d9]">Close</button>
    </div>
    <div id="reminder-list" class="space-y-2 mb-4"></div>
    <form id="reminder-form" class="space-y-3 border-t border-[#30363d] pt-4">
      <label class="block text-sm text-[#8b949e]">Notify at</label>
      <input id="reminder-notify-time" type="datetime-local" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-sm" required />
      <button type="submit" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white rounded-md px-3 py-2 text-sm">Save Reminder</button>
    </form>
  </div>
</div>

<!-- Login Modal -->
<div id="login-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/70 px-4">
  <div class="w-full max-w-md bg-[#161b22] border border-[#30363d] rounded-md p-6">
    <h2 class="text-lg font-semibold text-[#c9d1d9] mb-1">Sign in to StreakHub</h2>
    <p class="text-sm text-[#8b949e] mb-4">Use your username. In development, password <code class="text-[#58a6ff]">demo</code> is accepted.</p>
    <form id="login-form" class="space-y-3">
      <input id="login-username" type="text" placeholder="Username" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-sm" required />
      <input id="login-password" type="password" placeholder="Password" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-sm" required />
      <p id="login-error" class="hidden text-sm text-[#f85149]"></p>
      <div class="flex justify-end gap-2">
        <button type="button" id="login-cancel" class="px-3 py-2 text-sm border border-[#30363d] rounded-md hover:border-[#c9d1d9]">Cancel</button>
        <button type="submit" class="px-3 py-2 text-sm bg-[#238636] hover:bg-[#2ea043] text-white rounded-md">Sign in</button>
      </div>
    </form>
  </div>
</div>

<!-- Set today's date so todo-detail.js can filter tasks by date -->
<script>document.body.dataset.taskDate = new Date().toISOString().slice(0, 10);</script>
<script src="/js/api.js"></script>
<script src="/js/dnd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
<script src="/js/todo-detail.js"></script>
</body>
</html>
